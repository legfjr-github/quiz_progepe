<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz e Mapa PROGEPE - UFPE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bordo-ufpe: #990000;
            --preto-ufpe: #000000;
            --cinza-claro: #f4f4f9;
            --branco: #ffffff;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --map-yellow: #fff8e1;
            --map-hover: #ffecb3;
            --corredor: #eeeeee;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background: linear-gradient(135deg, #e0e0e0 0%, #ffffff 100%);
            color: var(--preto-ufpe);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .versalete { font-variant: small-caps; text-transform: lowercase; }

        .container { width: 100%; max-width: 1200px; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: var(--shadow);
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--bordo-ufpe), var(--preto-ufpe));
        }

        .header { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; gap: 20px; }
        .logo-ufpe { width: 60px; }
        .header-text { text-align: left; }
        .header-text h1 { font-size: 1.5rem; font-weight: 800; margin: 0; }
        .header-text h2 { font-size: 1.1rem; color: var(--bordo-ufpe); margin: 0; }

        .nav-tabs {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 25px;
            background: rgba(0,0,0,0.05); padding: 5px; border-radius: 50px;
            max-width: fit-content; margin-left: auto; margin-right: auto;
        }
        .tab-btn {
            background: transparent; border: none; padding: 10px 25px; border-radius: 40px;
            font-weight: 600; color: #666; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active { background: var(--branco); color: var(--bordo-ufpe); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .view-section { display: none; width: 100%; animation: fadeIn 0.4s ease-out; }
        .view-section.active { display: block; }

        .quiz-title { font-size: 1.6rem; color: #444; margin-bottom: 25px; font-weight: 400; }
        .options-grid { display: flex; flex-direction: column; gap: 10px; }
        .btn-option {
            background: var(--branco); border: 2px solid transparent; padding: 16px 20px;
            border-radius: 12px; font-size: 1.05rem; font-weight: 600; color: #333;
            cursor: pointer; transition: 0.3s; text-align: left;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
        }
        .btn-option:hover { border-color: var(--bordo-ufpe); transform: translateY(-2px); }

        /* --- Result Styling (Original V2) --- */
        .sector-badge {
            display: inline-block; background: var(--bordo-ufpe); color: var(--branco);
            padding: 8px 16px; border-radius: 50px; font-size: 0.85rem; font-weight: bold;
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;
        }
        .sector-name { font-size: 2rem; color: var(--preto-ufpe); margin-bottom: 5px; font-weight: 800; }
        .sector-hierarchy { font-size: 1rem; color: #666; margin-bottom: 5px; font-style: italic; display: block; text-align: left;}
        .sector-room { color: var(--bordo-ufpe); font-weight: 800; font-size: 1.1rem; margin-bottom: 25px; display: block; text-align: left; }
        
        .result-content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        @media (max-width: 800px) { .result-content { grid-template-columns: 1fr; } }
        
        .info-box { background: rgba(255, 255, 255, 0.6); padding: 25px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.05); }
        .info-box h3 { font-size: 1.1rem; color: var(--bordo-ufpe); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .info-list { list-style: none; }
        .info-list li { position: relative; padding-left: 25px; margin-bottom: 10px; font-size: 0.95rem; line-height: 1.4; }
        .info-list li::before { content: '●'; color: var(--bordo-ufpe); position: absolute; left: 0; font-size: 0.8rem; top: 2px; }
        
        .contact-card {
            background: var(--branco); padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; flex-direction: column; gap: 5px; border: 1px solid #eee;
        }
        .contact-label { font-size: 0.75rem; color: #999; text-transform: uppercase; font-weight: bold; }
        .contact-value { font-size: 0.95rem; color: #333; font-weight: 600; }

        .btn-restart {
            margin-top: 30px; background: var(--preto-ufpe); color: var(--branco);
            border: none; padding: 12px 35px; border-radius: 50px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }
        .btn-restart:hover { background: var(--bordo-ufpe); transform: scale(1.05); }

        /* --- Map SVG Styling --- */
        .map-wrapper { display: grid; grid-template-columns: 1fr 280px; gap: 20px; text-align: left; }
        @media (max-width: 950px) { .map-wrapper { grid-template-columns: 1fr; } }
        
        .map-container {
            background: white; border-radius: 15px; padding: 10px; border: 1px solid #eee;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02); min-height: 550px;
        }
        .room-path { fill: var(--map-yellow); stroke: #ccc; stroke-width: 0.5; cursor: pointer; transition: 0.2s; }
        .room-path:hover { fill: var(--bordo-ufpe); stroke: black; }
        .room-label { pointer-events: none; font-size: 6px; fill: #666; font-weight: bold; }
        
        .corredor-line { stroke: #f0f0f0; stroke-width: 10; stroke-linecap: round; }
        .area-vazia { fill: #fafafa; stroke: #eee; stroke-dasharray: 2; }
        .entrada-label { font-size: 8px; font-weight: bold; fill: var(--bordo-ufpe); }

        /* Drill-down Overlay */
        #selector-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.98); z-index: 100;
            display: none; flex-direction: column; justify-content: center; padding: 50px;
        }
        .overlay-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .close-overlay { position: absolute; top: 30px; right: 30px; border: none; font-size: 30px; cursor: pointer; background: transparent; }

        .legend-list { max-height: 550px; overflow-y: auto; padding: 10px; border-left: 1px solid #eee; }
        .legend-item { padding: 10px; cursor: pointer; border-radius: 8px; font-size: 0.8rem; border-bottom: 1px solid #f9f9f9; }
        .legend-item:hover, .legend-item.active { background: var(--bordo-ufpe); color: white; transition: background 0.2s; }

        #tooltip {
            position: fixed; background: #333; color: #fff; padding: 5px 10px;
            border-radius: 4px; font-size: 11px; display: none; z-index: 1000; pointer-events: none;
        }

        .result-content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        .links-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }

        .result-content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        .links-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="tooltip"></div>

    <div class="container">
        <div class="card" id="main-card">
            
            <div id="selector-overlay">
                <button class="close-overlay" onclick="closeOverlay()">×</button>
                <h2 id="overlay-title" style="color:var(--bordo-ufpe);">Escolha o Setor</h2>
                <div class="overlay-grid" id="overlay-grid"></div>
            </div>

            <div class="header">
                <img src="UFPELOGO.png" alt="Logo UFPE" class="logo-ufpe">
                <div class="header-text">
                    <h1>UNIVERSIDADE FEDERAL <span class="versalete">de</span> PERNAMBUCO</h1>
                    <h2>PROGEPE</h2>
                </div>
            </div>

            <div class="nav-tabs" id="nav-tabs">
                <button class="tab-btn active" id="tab-quiz" onclick="showTab('quiz')">Quiz</button>
                <button class="tab-btn" id="tab-map" onclick="showTab('map')">Mapa Reitoria</button>
            </div>

            <div id="view-quiz" class="view-section active">
                <h3 class="quiz-title" id="question-text">Para onde devemos encaminhar sua dúvida?</h3>
                <div class="options-grid" id="options-container"></div>
            </div>

            <div id="view-map" class="view-section">
                <div class="map-wrapper">
                    <div class="map-container">
                        <svg viewBox="0 0 500 550" width="100%" height="auto">
                            <!-- Corredores Verticais -->
                            <line x1="120" y1="20" x2="120" y2="530" class="corredor-line" />
                            <line x1="380" y1="20" x2="380" y2="530" class="corredor-line" />
                            <!-- Corredor Horizontal Central -->
                            <line x1="10" y1="275" x2="490" y2="275" class="corredor-line" />

                            <!-- Portarias -->
                            <rect x="110" y="265" width="20" height="20" fill="#eee" stroke="#ccc" />
                            <rect x="370" y="265" width="20" height="20" fill="#eee" stroke="#ccc" />
                            
                            <!-- CAS Entrance Left -->
                            <g onclick="showResult('CAS')">
                                <rect x="20" y="260" width="90" height="30" class="room-path" data-key="CAS" />
                                <text x="65" y="280" text-anchor="middle" class="room-label">CAS</text>
                            </g>

                            <!-- QUADRANTE SUPERIOR DIREITO -->
                            <!-- Corredor Externo (Direito): CASF + CAPP -->
                            <g onclick="showCoord('coord_casf')">
                                <rect x="420" y="20" width="60" height="150" class="room-path" data-key="coord_casf" />
                                <text x="450" y="95" text-anchor="middle" class="room-label" transform="rotate(90 450 95)">CASF</text>
                            </g>
                            <g onclick="showResult('CAPP')">
                                <rect x="420" y="180" width="60" height="60" class="room-path" data-key="CAPP" />
                                <text x="450" y="210" text-anchor="middle" class="room-label" transform="rotate(90 450 210)">CAPP</text>
                            </g>
                            <!-- Corredor Interno (Esquerdo do bloco): CAPE, DAP, CPP -->
                            <g onclick="showResult('CAPE')">
                                <rect x="330" y="20" width="40" height="70" class="room-path" data-key="CAPE" />
                                <text x="350" y="55" text-anchor="middle" class="room-label" transform="rotate(90 350 55)">CAPE</text>
                            </g>
                            <g onclick="showCoord('coord_dap')">
                                <rect x="330" y="100" width="40" height="50" class="room-path" data-key="coord_dap" />
                                <text x="350" y="125" text-anchor="middle" class="room-label" transform="rotate(90 350 125)">DAP</text>
                            </g>
                            <g onclick="showCoord('coord_cpp')">
                                <rect x="330" y="160" width="40" height="80" class="room-path" data-key="coord_cpp" />
                                <text x="350" y="200" text-anchor="middle" class="room-label" transform="rotate(90 350 200)">CPP (Pagamento)</text>
                            </g>

                            <!-- QUADRANTE INFERIOR DIREITO (Vazio) -->
                            <rect x="330" y="300" width="150" height="230" class="area-vazia" />
                            <text x="405" y="415" text-anchor="middle" class="room-label" style="fill:#ccc;">NÃO PROGEPE</text>

                            <!-- QUADRANTE SUPERIOR ESQUERDO -->
                            <!-- Corredor Externo (Esquerdo): DDP -->
                            <g onclick="showCoord('coord_ddp')">
                                <rect x="20" y="20" width="60" height="220" class="room-path" data-key="coord_ddp" />
                                <text x="50" y="130" text-anchor="middle" class="room-label" transform="rotate(-90 50 130)">DDP (Salas)</text>
                            </g>
                            <!-- Corredor Interno (Direito): DQV, GABINETE -->
                            <g onclick="showCoord('coord_dqv')">
                                <rect x="130" y="20" width="40" height="110" class="room-path" data-key="coord_dqv" />
                                <text x="150" y="75" text-anchor="middle" class="room-label" transform="rotate(-90 150 75)">DQV</text>
                            </g>
                            <g onclick="showCoord('coord_gab')">
                                <rect x="130" y="140" width="40" height="100" class="room-path" data-key="coord_gab" />
                                <text x="150" y="190" text-anchor="middle" class="room-label" transform="rotate(-90 150 190)">Gabinete</text>
                            </g>

                            <!-- QUADRANTE INFERIOR ESQUERDO -->
                            <!-- Corredor Externo (Esquerdo): FORMARE -->
                            <g onclick="showResult('FORMARE')">
                                <rect x="20" y="300" width="60" height="220" class="room-path" data-key="FORMARE" />
                                <text x="50" y="410" text-anchor="middle" class="room-label" transform="rotate(-90 50 410)">FORMARE</text>
                            </g>
                            <!-- Corredor Interno (Direito): DTICOM, GLCP -->
                            <g onclick="showResult('DTICOM')">
                                <rect x="130" y="300" width="40" height="110" class="room-path" data-key="DTICOM" />
                                <text x="150" y="355" text-anchor="middle" class="room-label" transform="rotate(-90 150 355)">DTICOM</text>
                            </g>
                            <g onclick="showResult('GLCP')">
                                <rect x="130" y="420" width="40" height="100" class="room-path" data-key="GLCP" />
                                <text x="150" y="470" text-anchor="middle" class="room-label" transform="rotate(-90 150 470)">GLCP</text>
                            </g>

                            <!-- Centro Vazio -->
                            <rect x="180" y="20" width="140" height="240" class="area-vazia" />
                            <text x="250" y="140" text-anchor="middle" class="room-label" style="fill:#ccc;">VÃO CENTRAL</text>
                            <rect x="180" y="300" width="140" height="230" class="area-vazia" />
                        </svg>
                    </div>
                    <div class="legend-list" id="legend-container"></div>
                </div>
            </div>

            <div id="view-result" class="view-section">
                <span class="sector-badge" id="res-tag">Setor</span>
                <h2 class="sector-name" id="res-name"></h2>
                <span class="sector-hierarchy" id="res-hierarchy"></span>
                <div class="result-content">
                    <div class="info-box">
                        <h3><svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M11 17h2v-6h-2v6zm1-8q.425 0 .713-.288T13 8q0-.425-.288-.713T12 7q-.425 0-.713.288T11 8q0 .425.288.713T12 9zm0-7C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg> O que faz este setor?</h3>
                        <ul class="info-list" id="res-tasks"></ul>
                    </div>
                    <div class="info-box" id="res-links-box">
                        <h3><svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M3.9 12c.5-1.5 1.5-2.5 3-3h12a3 3 0 0 1 3 3a3 3 0 0 1-3 3h-12c-1.5-.5-2.5-1.5-3-3M8 11h-4.2c-.3.4-.6.8-.8 1.2c.2.4.5.8.8 1.2l4.2.1V11m12.2.1h-4.2v2.4l4.2-.1c.3-.4.6-.8.8-1.2c-.2-.4-.5-.8-.8-1.1Z"/></svg> Documentação e Links</h3>
                        <div class="links-grid" id="res-links"></div>
                    </div>
                    <div class="info-box">
                        <h3><svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg> Contatos</h3>
                        <div id="res-contacts"></div>
                    </div>
                </div>
                <button class="btn-restart" onclick="restartQuiz()">Voltar / Nova Consulta</button>
            </div>

            <p class="footer-tag" style="margin-top:20px; font-size:0.7rem; color:#aaa;">Pró-Reitoria de Gestão de Pessoas e Qualidade de Vida (PROGEPE)</p>
        </div>
    </div>

        function showTab(t) {
            document.querySelectorAll('.tab-btn, .view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            document.getElementById('view-' + t).classList.add('active');
        }

        function renderQuestion(id) {
            const q = questions.find(q => q.id === id);
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('question-text').innerText = q.text;
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerText = opt.text;
                btn.onclick = () => opt.result ? showResult(opt.result) : renderQuestion(opt.next);
                container.appendChild(btn);
            });
        }

        function showResult(key) {
            closeOverlay();
            const d = sectorsData[key];
            if (!d) return;
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-result').classList.add('active');
            document.getElementById('res-tag').innerText = d.tag;
            document.getElementById('res-name').innerText = d.name;
            document.getElementById('res-hierarchy').innerText = d.hierarchy;
            document.getElementById('res-tasks').innerHTML = d.tasks.map(t => `<li>${t}</li>`).join('');
            
            const lBox = document.getElementById('res-links-box');
            const lGrid = document.getElementById('res-links');
            if (d.links && d.links.length > 0) {
                lBox.style.display = 'block';
                lGrid.innerHTML = d.links.map(l => `
                    <div class="contact-card" style="padding:10px; cursor:pointer;" onclick="window.open('${l.url}', '_blank')">
                        <span class="contact-value" style="color:var(--bordo-ufpe);">🔗 ${l.label}</span>
                    </div>
                `).join('');
            } else {
                lBox.style.display = 'none';
            }

            document.getElementById('res-contacts').innerHTML = d.contacts.map(c => `
                <div class="contact-card">
                    <span class="contact-label">${c.label}</span>
                    <span class="contact-value">${c.val}</span>
                </div>
            `).join('');
        }

        function showCoord(key) {
            const g = coordinationGroups[key];
            const grid = document.getElementById('overlay-grid');
            document.getElementById('overlay-title').innerText = g.name;
            grid.innerHTML = '';
            g.items.forEach(k => {
                const b = document.createElement('button');
                b.className = 'btn-option';
                b.innerText = coordinationGroups[k] ? coordinationGroups[k].name : (sectorsData[k] ? sectorsData[k].name : k);
                b.onclick = () => coordinationGroups[k] ? showCoord(k) : showResult(k);
                grid.appendChild(b);
            });
            document.getElementById('selector-overlay').style.display = 'flex';
        }

        function closeOverlay() { document.getElementById('selector-overlay').style.display = 'none'; }
        function restartQuiz() { showTab('quiz'); renderQuestion(1); }

        function initMap() {
            const legend = document.getElementById('legend-container');
            const tooltip = document.getElementById('tooltip');
            
            // Build Legend First to assign IDs
            const legendKeys = ["CAS", "coord_casf", "CAPP", "CAPE", "coord_dap", "coord_cpp", "coord_ddp", "coord_dqv", "coord_gab", "DTICOM", "GLCP", "FORMARE"];
            legendKeys.forEach(k => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.id = 'legend-' + k;
                item.innerHTML = coordinationGroups[k] ? `<b>${coordinationGroups[k].name}</b>` : (sectorsData[k] ? sectorsData[k].name : k);
                item.onclick = () => coordinationGroups[k] ? showCoord(k) : showResult(k);
                legend.appendChild(item);
            });

            document.querySelectorAll('.room-path').forEach(p => {
                const k = p.getAttribute('data-key');
                p.onmouseenter = (e) => {
                    tooltip.innerText = coordinationGroups[k] ? coordinationGroups[k].name : (sectorsData[k] ? sectorsData[k].name : "");
                    tooltip.style.display = 'block';
                    
                    // Highlight Legend
                    const legItem = document.getElementById('legend-' + k);
                    if (legItem) {
                        legItem.classList.add('active');
                        legItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                };
                p.onmousemove = (e) => { tooltip.style.left = e.clientX + 10 + 'px'; tooltip.style.top = e.clientY + 10 + 'px'; };
                p.onmouseleave = () => {
                    tooltip.style.display = 'none';
                    document.querySelectorAll('.legend-item').forEach(li => li.classList.remove('active'));
                };
            });
        }

        window.onload = () => { renderQuestion(1); initMap(); };
